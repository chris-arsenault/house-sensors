x-house-sensors-otel: &house-sensors-otel
  DEPLOYMENT_ENVIRONMENT: "truenas"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://192.168.66.3:4318"
  OTEL_METRIC_EXPORT_INTERVAL: "30000"
  OTEL_METRICS_EXPORTER: "otlp"
  OTEL_RESOURCE_ATTRIBUTES: "service.namespace=house-sensors,deployment.environment=truenas,project=house-sensors"
  # Cognito M2M (client_credentials) auth for the observability ingest gateway.
  OBS_INGEST_CLIENT_ID: "${OBS_INGEST_CLIENT_ID}"
  OBS_INGEST_CLIENT_SECRET: "${OBS_INGEST_CLIENT_SECRET}"
  OBS_INGEST_TOKEN_URL: "https://auth.services.ahara.io/oauth2/token"
  OBS_INGEST_SCOPE: "observability/ingest"

x-house-sensors-influx-url: &house-sensors-influx-url "http://192.168.66.3:18086"

services:
  environment-sensors:
    image: ghcr.io/chris-arsenault/house-sensors/collectors/environment-sensors:${IMAGE_TAG:-latest}
    init: true
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    network_mode: host
    environment:
      <<: *house-sensors-otel
      OTEL_SERVICE_NAME: "house-sensors.environment-sensors"
      INFLUX_URL: *house-sensors-influx-url
      INFLUX_ORG: "ahara"
      INFLUX_BUCKET: "environment-data"
      INFLUX_TOKEN: "${ENV_SENSOR_INFLUX_TOKEN}"
      DEVICE_USER: "${ENV_SENSOR_DEVICE_USER}"
      DEVICE_PASS: "${ENV_SENSOR_DEVICE_PASS}"

  volt:
    image: ghcr.io/chris-arsenault/house-sensors/collectors/volt:${IMAGE_TAG:-latest}
    container_name: volt
    init: true
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    network_mode: host
    environment:
      <<: *house-sensors-otel
      OTEL_SERVICE_NAME: "house-sensors.volt"
      INFLUXDB_URL: *house-sensors-influx-url
      INFLUXDB_TOKEN: "${VOLT_INFLUXDB_TOKEN}"
      INFLUXDB_ORG: "ahara"
      INFLUXDB_BUCKET: "voltage-data"
      COLLECTION_INTERVAL: "1"
      KASA_USERNAME: "${KASA_USERNAME}"
      KASA_PASSWORD: "${KASA_PASSWORD}"

  volt-event:
    image: ghcr.io/chris-arsenault/house-sensors/management/volt-event:${IMAGE_TAG:-latest}
    init: true
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    environment:
      INFLUX_URL: *house-sensors-influx-url
      INFLUX_ORG: "ahara"
      INFLUX_BUCKET: "voltage-data"
      INFLUX_TOKEN: "${VOLT_EVENT_INFLUX_TOKEN}"
    ports:
      - "192.168.66.3:8085:80"

  downsampling-medium:
    image: ghcr.io/chris-arsenault/house-sensors/jobs/downsampling:${IMAGE_TAG:-latest}
    command: ["python", "-u", "raw_to_medium.py", "run-loop"]
    init: true
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    environment:
      <<: *house-sensors-otel
      OTEL_SERVICE_NAME: "house-sensors.downsampling-medium"
      INFLUX_URL: *house-sensors-influx-url
      INFLUX_ORG: "ahara"
      INFLUX_TOKEN: "${DOWNSAMPLER_INFLUX_TOKEN}"
      DOWNSAMPLE_RAW_POWER_BUCKET: "voltage-data"
      DOWNSAMPLE_RAW_ENV_BUCKET: "environment-data"
      DOWNSAMPLE_MEDIUM_BUCKET: "sensors-medium"
      DOWNSAMPLE_MEDIUM_MEASUREMENT: "sensors"
      DOWNSAMPLE_MEDIUM_STATE_FILE: "/state/raw_to_medium_state.json"
      DOWNSAMPLE_MEDIUM_DAYS_BACK: "365"
      DOWNSAMPLE_MEDIUM_CHUNK_MINUTES: "15"
      DOWNSAMPLE_MEDIUM_WRITE_BATCH_SIZE: "2500"
      DOWNSAMPLE_MEDIUM_WRITE_BATCH_SLEEP_SECONDS: "0.25"
      DOWNSAMPLE_MEDIUM_CHUNK_SLEEP_SECONDS: "2"
      DOWNSAMPLE_MEDIUM_INTERVAL_SECONDS: "60"
      DOWNSAMPLE_MEDIUM_DELAY_SECONDS: "60"
      DOWNSAMPLE_MEDIUM_OVERLAP_MINUTES: "5"
      DOWNSAMPLE_MINUTE_THRESHOLD_QUANTILE: "0.95"
      DOWNSAMPLE_MINUTE_THRESHOLD_ALPHA: "0.2"
      DOWNSAMPLE_MINUTE_TARGET_ANOM_RATE: "0.05"
      DOWNSAMPLE_MINUTE_RATE_BETA: "0.25"
      DOWNSAMPLE_MEDIUM_LEARN_THRESHOLDS: "true"
      DOWNSAMPLE_MEDIUM_LEARN_INCREMENTAL: "false"
      DOWNSAMPLE_ENSURE_MEDIUM_BUCKET: "true"
      DOWNSAMPLE_MEDIUM_RETENTION_SECONDS: "0"
      DOWNSAMPLE_ABS_BOUNDS_JSON: "{}"
      DOWNSAMPLE_MINUTE_THRESH_JSON: "{}"
    volumes:
      - downsampling-medium-state:/state

  downsampling-long:
    image: ghcr.io/chris-arsenault/house-sensors/jobs/downsampling:${IMAGE_TAG:-latest}
    command: ["python", "-u", "medium_to_long_backfill.py", "run-loop"]
    init: true
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    environment:
      <<: *house-sensors-otel
      OTEL_SERVICE_NAME: "house-sensors.downsampling-long"
      INFLUX_URL: *house-sensors-influx-url
      INFLUX_ORG: "ahara"
      INFLUX_TOKEN: "${DOWNSAMPLER_INFLUX_TOKEN}"
      DOWNSAMPLE_SRC_BUCKET: "sensors-medium"
      DOWNSAMPLE_DST_BUCKET: "sensors-long"
      DOWNSAMPLE_MEASUREMENT: "sensors"
      DOWNSAMPLE_STATE_FILE: "/state/medium_to_long_state.json"
      DOWNSAMPLE_DAYS_BACK: "365"
      DOWNSAMPLE_CHUNK_MINUTES: "60"
      DOWNSAMPLE_WRITE_BATCH_SIZE: "2500"
      DOWNSAMPLE_WRITE_BATCH_SLEEP_SECONDS: "0.25"
      DOWNSAMPLE_CHUNK_SLEEP_SECONDS: "2"
      DOWNSAMPLE_ADVANCE_EMPTY_WINDOWS: "false"
      DOWNSAMPLE_INTERVAL_SECONDS: "3600"
      DOWNSAMPLE_DELAY_MINUTES: "10"
      DOWNSAMPLE_THRESHOLD_QUANTILE: "0.95"
      DOWNSAMPLE_THRESHOLD_ALPHA: "0.2"
      DOWNSAMPLE_TARGET_ANOM_RATE: "0.05"
      DOWNSAMPLE_RATE_BETA: "0.25"
      DOWNSAMPLE_ENSURE_DST_BUCKET: "true"
      DOWNSAMPLE_DST_RETENTION_SECONDS: "0"
      DOWNSAMPLE_ABS_BOUNDS_JSON: "{}"
      DOWNSAMPLE_HOUR_THRESH_JSON: "{}"
    volumes:
      - downsampling-long-state:/state

  raw-archive-cleanup:
    image: ghcr.io/chris-arsenault/house-sensors/jobs/downsampling:${IMAGE_TAG:-latest}
    command:
      - /usr/local/bin/truenas-roles-anywhere-bootstrap
      - AWS_RA_RAW_ARCHIVE
      - --
      - python
      - -u
      - raw_archive_cleanup.py
      - run-loop
    init: true
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    environment:
      <<: *house-sensors-otel
      OTEL_SERVICE_NAME: "house-sensors.raw-archive-cleanup"
      INFLUX_URL: *house-sensors-influx-url
      INFLUX_ORG: "ahara"
      INFLUX_TOKEN: "${DOWNSAMPLER_INFLUX_TOKEN}"
      AWS_REGION: "us-east-1"
      AWS_DEFAULT_REGION: "us-east-1"
      AWS_SDK_LOAD_CONFIG: "1"
      AWS_RA_RAW_ARCHIVE_WORKLOAD_ID: "${AWS_RA_RAW_ARCHIVE_WORKLOAD_ID}"
      AWS_RA_RAW_ARCHIVE_ENROLLMENT_TOKEN: "${AWS_RA_RAW_ARCHIVE_ENROLLMENT_TOKEN}"
      AWS_RA_RAW_ARCHIVE_ENROLLMENT_URL: "${AWS_RA_RAW_ARCHIVE_ENROLLMENT_URL}"
      AWS_RA_RAW_ARCHIVE_TRUST_ANCHOR_ARN: "${AWS_RA_RAW_ARCHIVE_TRUST_ANCHOR_ARN}"
      AWS_RA_RAW_ARCHIVE_PROFILE_ARN: "${AWS_RA_RAW_ARCHIVE_PROFILE_ARN}"
      AWS_RA_RAW_ARCHIVE_ENTRY_ROLE_ARN: "${AWS_RA_RAW_ARCHIVE_ENTRY_ROLE_ARN}"
      AWS_RA_RAW_ARCHIVE_ROLE_ARN: "${AWS_RA_RAW_ARCHIVE_ROLE_ARN}"
      RAW_ARCHIVE_S3_BUCKET: "${RAW_ARCHIVE_S3_BUCKET}"
      RAW_ARCHIVE_S3_PREFIX: "house-sensors/raw"
      RAW_ARCHIVE_RAW_BUCKETS: "environment-data,voltage-data"
      RAW_ARCHIVE_MEDIUM_BUCKET: "sensors-medium"
      RAW_ARCHIVE_MEDIUM_MEASUREMENT: "sensors"
      RAW_ARCHIVE_STATE_FILE: "/state/raw_archive_cleanup_state.json"
      RAW_ARCHIVE_MEDIUM_STATE_FILE: "/downsampling-medium-state/raw_to_medium_state.json"
      RAW_ARCHIVE_LONG_STATE_FILE: "/downsampling-long-state/medium_to_long_state.json"
      RAW_ARCHIVE_RAW_RETENTION_DAYS: "30"
      RAW_ARCHIVE_MEDIUM_RETENTION_MONTHS: "6"
      RAW_ARCHIVE_CHUNK_HOURS: "6"
      RAW_ARCHIVE_CHUNK_SLEEP_SECONDS: "2"
      RAW_ARCHIVE_INTERVAL_SECONDS: "3600"
      RAW_ARCHIVE_CREATE_S3_BUCKET: "false"
      RAW_ARCHIVE_DELETE_ENABLED: "false"
    volumes:
      - raw-archive-state:/state
      - raw-archive-aws-identity:/var/lib/ahara/aws-identity
      - downsampling-medium-state:/downsampling-medium-state:ro
      - downsampling-long-state:/downsampling-long-state:ro

volumes:
  downsampling-medium-state:
  downsampling-long-state:
  raw-archive-state:
  raw-archive-aws-identity:
